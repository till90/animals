 .slog{color:#2D5F3F;font-size:.8rem}

<script>
function setMode(m){
  document.getElementById('bp').classList.toggle('active',m==='png');
  document.getElementById('bs').classList.toggle('active',m==='svg');
  document.querySelectorAll('.card img').forEach(img=>{
    img.src=img.src.replace(/(png|svg)\/([^\/]+)\.(png|svg)/,m+'/$2.'+m);
  });
}
</script>
